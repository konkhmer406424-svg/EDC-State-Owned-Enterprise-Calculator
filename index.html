<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDC គណនាថ្លៃអគ្គិសនី</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f9f9f7; font-family: sans-serif; min-height: 100vh; }
  input[type=range] { cursor: pointer; }
  button:hover { opacity: 0.85; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const K = ['០','១','២','៣','៤','៥','៦','៧','៨','៩'];
const toKh = (n) => String(Math.round(n)).replace(/\d/g, d => K[d]);
const numToKhmer = (n) => {
  const s = Math.round(n).toString();
  const parts = [];
  let i = s.length;
  while (i > 0) { parts.unshift(s.slice(Math.max(0, i - 3), i)); i -= 3; }
  return parts.map(p => p.replace(/\d/g, d => K[d])).join(',');
};
const khmerToArab = (s) => String(s).replace(/[០-៩]/g, d => K.indexOf(d).toString());

const tiers = [
  { id: "special", label: "គន្លាក់ពិសេស", range: "១–១០ kWh", rate: 380, color: "#0F6E56", bg: "#E1F5EE", badgeText: "✦ ពិសេស", barColor: "#5DCAA5", barPct: "28%" },
  { id: "t1", label: "គន្លាក់ទី ១", range: "១១–៥០ kWh", rate: 480, color: "#185FA5", bg: "#E6F1FB", badgeText: "① គន្លាក់ ១", barColor: "#85B7EB", barPct: "50%" },
  { id: "t2", label: "គន្លាក់ទី ២", range: "៥១–២០០ kWh", rate: 610, color: "#854F0B", bg: "#FAEEDA", badgeText: "② គន្លាក់ ២", barColor: "#FAC775", barPct: "72%" },
  { id: "t3", label: "គន្លាក់ទី ៣", range: "លើស ២០០ kWh", rate: 740, color: "#993C1D", bg: "#FAECE7", badgeText: "③ គន្លាក់ ៣", barColor: "#F0997B", barPct: "100%" },
];

function calcBill(units) {
  if (units <= 0) return { total: 0, lines: [] };
  const tierDefs = [
    { max: 10,       rate: 380, tierName: "គន្លាក់ពិសេស" },
    { max: 50,       rate: 480, tierName: "គន្លាក់ទី១" },
    { max: 200,      rate: 610, tierName: "គន្លាក់ទី២" },
    { max: Infinity, rate: 740, tierName: "គន្លាក់ទី៣" },
  ];
  const tier = tierDefs.find(t => units <= t.max);
  const cost = Math.round(units * tier.rate);
  return {
    total: cost,
    lines: [{ tierName: tier.tierName, qty: units, rate: tier.rate, cost }]
  };
}

function getTip(units) {
  if (units <= 10) return "អ្នកនៅក្នុងគន្លាក់ពិសេស! ល្អបំផុត 🎉";
  if (units <= 50) return "ល្អ! ព្យាយាមប្រើឱ្យតិចជាង ១០ kWh ទៀតដើម្បីបានតម្លៃពិសេស";
  if (units <= 200) return "ប្រើទល់ ២០០ kWh ក្នុងគន្លាក់ ២ — ព្យាយាមចៀសវាងចូលគន្លាក់ ៣";
  return "ប្រើច្រើន! ព្យាយាមចុះក្រោម ២០០ kWh ដើម្បីចៀសវាងគន្លាក់ ៣";
}

const btnStyle = {
  display: "flex", alignItems: "center", gap: 6, fontSize: 13,
  padding: "6px 12px", borderRadius: 8, border: "0.5px solid #ccc",
  background: "#fff", cursor: "pointer", color: "#444", marginBottom: "1.25rem"
};

function PageSaving({ onBack }) {

    { icon: "💡", title: "អំពូលភ្លឺ", what: "អំពូល Incandescent និង Halogen ប្រើថាមពល ៥–១០ ដងច្រើនជាង LED", how: ["ប្ដូរអំពូលទាំងអស់ទៅ LED (១ ដងមានអាយុ ១០ ឆ្នាំ)","បិទភ្លឺពេលចេញពីបន្ទប់","ប្រើ natural light ពេលថ្ងៃ"], save: "~១០–២០ kWh/ខែ" },
    { icon: "🧊", title: "ទូទឹកកក", what: "ទូទឹកកកដំណើរការ ២៤/៧ — ប្រសិនគ្មានការថែទាំ ចំណាយថាមពលបន្ថែម", how: ["កុំដាក់របស់ក្ដៅចូលភ្លាម — ទុករង់ត្រជាក់សិន","ទុក coil ខាងក្រោយ/ក្រោយឱ្យចំហ — ១០ ស.ម.យ៉ាងហោច","បំពេញ ៧០–៨០% — ទំនេរពេកធ្វើឱ្យត្រជាក់ស្ពឺ","ពិនិត្យ seal ទ្វារ — ប្រសិន seal ចាស់ ខ្យល់ត្រជាក់លេច"], save: "~៥–១៥ kWh/ខែ" },
    { icon: "📺", title: "ឧបករណ៍ Standby", what: "TV, charger, ប្រអប់ internet ជាដើម ប្រើអគ្គិសនីស្ងាត់ ទោះបិទ", how: ["ដកខ្សែ charger ចេញពេលសាកចប់","ប្រើ power strip ដែលអាចបិទបាន — បិទម្ដងទាំងអស់","TV, speaker, ប្រអប់ Router — ត្រូវបិទ main switch"], save: "~៥–១០ kWh/ខែ" },
    { icon: "🌊", title: "ម៉ាស៊ីនបូមទឹក", what: "ម៉ាស៊ីនបូមទឹកដែលចាក់ជាប់ ឬ ដំណើរការញឹកញាប់ ចំណាយថាមពលខ្ពស់", how: ["ប្រើ timer — ដំណើរការ ២–៣ ដងក្នុងមួយថ្ងៃ","ពិនិត្យ pipe ចូក — ប្រសិនចូកមួយចំណុច ម៉ាស៊ីនឆ្លាស់ 24 ម៉ោង","ដំឡើង water tank ធំ — ទុកទឹករក្សាទុក"], save: "~១០–២០ kWh/ខែ" },
    { icon: "🧺", title: "ម៉ាស៊ីនបោកខោអាវ", what: "ម៉ាស៊ីនបោកខោអាវ ជាពិសេស dryer ប្រើថាមពលខ្ពស់ណាស់", how: ["បោកខោអាវពេលមានពេញ — កុំបោកតែបន្តិច","ប្រើទឹកត្រជាក់ (Cold wash) — ចំណាយថាមពលតិចជាង ៩០%","ហាលនៅថ្ងៃ — ជំនួស dryer"], save: "~៥–១៥ kWh/ខែ" },

    <div style={{ padding: "1.5rem 1rem", maxWidth: 680, margin: "0 auto" }}>
      <button onClick={onBack} style={btnStyle}>← ត្រឡប់ក្រោយ</button>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: "1.25rem" }}>
        <span style={{ fontSize: 28 }}>🌿</span>
        <div>
          <div style={{ fontSize: 17, fontWeight: 500, color: "#111" }}>គន្លឹះសំចៃអគ្គិសនី</div>
          <div style={{ fontSize: 12, color: "#666" }}>វិធីជាក់ស្ដែងដើម្បីបន្ថយថ្លៃអគ្គិសនីប្រចាំខែ</div>
        </div>
      </div>
      {tips.map((t, i) => (
        <div key={i} style={{ background: "#fff", border: "0.5px solid #e8e8e8", borderRadius: 12, padding: "1rem 1.1rem", marginBottom: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 22 }}>{t.icon}</span>
              <span style={{ fontSize: 15, fontWeight: 500, color: "#111" }}>{t.title}</span>
            </div>
            <span style={{ fontSize: 11, background: "#E1F5EE", color: "#0F6E56", padding: "2px 8px", borderRadius: 20, fontWeight: 500, flexShrink: 0, marginLeft: 8 }}>សន្សំ {t.save}</span>
          </div>
          <div style={{ fontSize: 12, color: "#888", marginBottom: 8, paddingLeft: 30 }}>{t.what}</div>
          <div style={{ paddingLeft: 30 }}>
            {t.how.map((h, j) => (
              <div key={j} style={{ display: "flex", alignItems: "flex-start", gap: 6, fontSize: 13, color: "#444", marginBottom: 4, lineHeight: 1.5 }}>
                <span style={{ color: "#1D9E75", fontWeight: 500, flexShrink: 0, marginTop: 1 }}>✓</span>
                <span>{h}</span>
              </div>
            ))}
          </div>
        </div>
      ))}
      <div style={{ background: "#E1F5EE", borderRadius: 10, padding: "0.9rem 1rem", fontSize: 13, color: "#085041", marginTop: 4 }}>
        💡 <strong>ប្រសិនធ្វើបានទាំង ៦ ចំណុច</strong> — អ្នកអាចបន្ថយ ៥០–១០០ kWh ក្នុងមួយខែ ស្មើ <strong>សន្សំបាន ៣០,០០០–៦០,០០០ ៛!</strong>
      </div>
    </div>
  );
}

    { icon: "📱", title: "ABA Mobile", steps: ["បើក ABA App → Pay Bills","ជ្រើស EDC","វាយលេខអតិថិជន (Customer ID)","ពិនិត្យ រួចចុច Pay"], color: "#0F6E56", bg: "#E1F5EE" },
    { icon: "🏦", title: "ACLEDA ToanChet", steps: ["បើក ACLEDA App → Utilities","ជ្រើស EDC","វាយ Account Number","បញ្ជាក់ PIN → Pay"], color: "#185FA5", bg: "#E6F1FB" },

      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(190px, 1fr))", gap: 10 }}>

          <div key={i} style={{ background: "#fff", border: "0.5px solid #e0e0e0", borderRadius: 12, padding: "1rem" }}>
            <div style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 40, height: 40, borderRadius: 10, background: m.bg, fontSize: 20, marginBottom: 8 }}>{m.icon}</div>
            <div style={{ fontSize: 14, fontWeight: 500, color: "#111", marginBottom: 8 }}>{m.title}</div>

function PagePlan({ onBack }) {
  const [usageInput, setUsageInput] = useState("១៥០");
  const [goalInput, setGoalInput] = useState("១០០");
  const [usage, setUsage] = useState(150);
  const [goal, setGoal] = useState(100);

  const handleChange = (raw, setInput, setNum) => {
    setInput(raw);
    const arabStr = khmerToArab(raw);
    const v = parseInt(arabStr, 10);
    if (!isNaN(v) && v >= 0) setNum(v);
  };

  const currentBill = calcBill(usage).total;
  const goalBill = calcBill(goal).total;
  const saving = Math.max(0, currentBill - goalBill);
  const diffKwh = Math.max(0, usage - goal);
  const pct = usage > 0 ? Math.round((diffKwh / usage) * 100) : 0;

  const steps = [
    { label: "កំណត់ AC ២៥°C + បិទ ១ ម៉ោង/ថ្ងៃ", save: 35 },
    { label: "ប្ដូរអំពូលទាំងអស់ទៅ LED", save: 15 },
    { label: "ដកខ្សែ Standby ចេញ", save: 8 },
    { label: "ប្រើ washing machine ពេលពេញ", save: 10 },
    { label: "ពិនិត្យ seal ទូទឹកកក + coil", save: 7 },
    { label: "ប្រើ timer ម៉ាស៊ីនបូមទឹក", save: 12 },
  ];

  return (
    <div style={{ padding: "1.5rem 1rem", maxWidth: 680, margin: "0 auto" }}>
      <button onClick={onBack} style={btnStyle}>← ត្រឡប់ក្រោយ</button>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: "1.25rem" }}>
        <span style={{ fontSize: 28 }}>🎯</span>
        <div>
          <div style={{ fontSize: 17, fontWeight: 500, color: "#111" }}>ផែនការសន្សំអគ្គិសនី</div>
          <div style={{ fontSize: 12, color: "#666" }}>កំណត់គោលដៅ ហើយមើលថ្លៃដែលអ្នកសន្សំបាន</div>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: "1rem" }}>
        {[
          { label: "ប្រើប្រាស់បច្ចុប្បន្ន", val: usageInput, num: usage, color: "#993C1D", bg: "#FAECE7", setI: setUsageInput, setN: setUsage },
          { label: "គោលដៅខែក្រោយ", val: goalInput, num: goal, color: "#185FA5", bg: "#E6F1FB", setI: setGoalInput, setN: setGoal },
        ].map((f, i) => (
          <div key={i} style={{ background: "#fff", border: "0.5px solid #e0e0e0", borderRadius: 12, padding: "1rem" }}>
            <div style={{ fontSize: 12, color: "#888", marginBottom: 8 }}>{f.label}</div>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
              <input
                type="text"
                value={f.val}
                onChange={e => handleChange(e.target.value, f.setI, f.setN)}
                onBlur={() => f.setI(toKh(f.num))}
                style={{ width: 72, padding: "6px 8px", fontSize: 16, fontWeight: 500, border: `1.5px solid ${f.color}`, borderRadius: 8, textAlign: "center", color: f.color, background: f.bg, outline: "none" }}
              />
              <span style={{ fontSize: 13, color: "#888" }}>kWh</span>
            </div>
            <div style={{ fontSize: 13, color: "#555" }}>
              ថ្លៃប្រមាណ៖ <span style={{ fontWeight: 500, color: f.color }}>{numToKhmer(i === 0 ? currentBill : goalBill)} ៛</span>
            </div>
          </div>
        ))}
      </div>
      <div style={{ background: saving > 0 ? "#E1F5EE" : "#f5f5f5", borderRadius: 12, padding: "1rem 1.25rem", marginBottom: "1rem", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div style={{ fontSize: 13, color: saving > 0 ? "#085041" : "#888", fontWeight: 500 }}>
            {saving > 0 ? "💰 សន្សំបានប្រចាំខែ" : "បញ្ចូលគោលដៅ ដើម្បីឃើញការសន្សំ"}
          </div>
          {saving > 0 && (
            <>
              <div style={{ fontSize: 12, color: "#0F6E56", marginTop: 3 }}>កាត់ {numToKhmer(diffKwh)} kWh ({toKh(pct)}%)</div>
              <div style={{ fontSize: 12, color: "#0F6E56", marginTop: 2 }}>ក្នុង ១ ឆ្នាំ សន្សំបាន {numToKhmer(saving * 12)} ៛</div>
            </>
          )}
        </div>
        {saving > 0 && (
          <div style={{ fontSize: 26, fontWeight: 500, color: "#0F6E56" }}>{numToKhmer(saving)} ៛</div>
        )}
      </div>
      <div style={{ background: "#fff", border: "0.5px solid #e0e0e0", borderRadius: 12, padding: "1rem 1.1rem" }}>
        <div style={{ fontSize: 14, fontWeight: 500, color: "#111", marginBottom: 10 }}>
          ជំហានណែនាំ {diffKwh > 0 ? `(ដើម្បីកាត់ ${numToKhmer(diffKwh)} kWh)` : "(កំណត់គោលដៅដើម្បីឃើញផែនការ)"}
        </div>
        {(() => {
          let cum = 0;
          return steps.map((s, i) => {
            cum += s.save;
            // tick steps until cumulative savings covers the gap
            const done = diffKwh > 0 && cum <= diffKwh;
            return (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: i < steps.length - 1 ? "0.5px solid #f0f0f0" : "none" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 13, color: done ? "#1D9E75" : "#bbb", fontWeight: 500 }}>{done ? "✓" : "○"}</span>
                  <span style={{ fontSize: 13, color: done ? "#333" : "#aaa" }}>{s.label}</span>
                </div>
                <span style={{ fontSize: 12, background: done ? "#E1F5EE" : "#f5f5f5", color: done ? "#0F6E56" : "#aaa", padding: "2px 8px", borderRadius: 6, fontWeight: 500, flexShrink: 0, marginLeft: 8 }}>
                  −{toKh(s.save)} kWh
                </span>
              </div>
            );
          });
        })()}
      </div>
    </div>
  );
}

function EDCTariff() {
  const [page, setPage] = useState("main");
  const [units, setUnits] = useState(80);
  const [inputVal, setInputVal] = useState("៨០");
  const { total, lines } = calcBill(units);

  const handleInput = (raw) => {
    setInputVal(raw);
    const arab = khmerToArab(raw);
    const v = parseInt(arab, 10);
    if (!isNaN(v) && v >= 0) setUnits(v);
  };

  const handleSlider = (e) => {
    const v = Number(e.target.value);
    setUnits(v);
    setInputVal(toKh(v));
  };

  if (page === "saving") return <PageSaving onBack={() => setPage("main")} />;
  if (page === "payment") return <PagePayment onBack={() => setPage("main")} />;
  if (page === "plan") return <PagePlan onBack={() => setPage("main")} />;

  return (
    <div style={{ fontFamily: "sans-serif", padding: "1.5rem 1rem", maxWidth: 680, margin: "0 auto" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: "1.5rem" }}>
        <div style={{ width: 48, height: 48, borderRadius: "50%", background: "#1D9E75", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
          <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
            <path d="M15 3L5 16h9l-1 9 10-13h-9l1-9z" fill="white" strokeWidth="0.5" strokeLinejoin="round"/>
          </svg>
        </div>
        <div>
          <div style={{ fontSize: 17, fontWeight: 500, color: "#111" }}>តារាងតម្លៃអគ្គិសនីលំនៅឋាន (EDC)</div>
          <div style={{ fontSize: 12, color: "#666", marginTop: 2 }}>Electricité du Cambodge · គ្រឹះស្ថានអគ្គិសនីកម្ពុជា</div>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 10, marginBottom: "1.25rem" }}>
        {tiers.map(t => (
          <div key={t.id} style={{ background: "#fff", border: t.id === "special" ? `1.5px solid ${t.color}` : "0.5px solid #e0e0e0", borderRadius: 12, padding: "0.9rem" }}>
            <div style={{ display: "inline-block", fontSize: 11, padding: "2px 8px", borderRadius: 6, background: t.bg, color: t.color, fontWeight: 500, marginBottom: 6 }}>{t.badgeText}</div>
            <div style={{ fontSize: 14, fontWeight: 500, color: "#111", marginBottom: 2 }}>{t.label}</div>
            <div style={{ fontSize: 11, color: "#888", marginBottom: 8 }}>⚡ {t.range}</div>
            <div style={{ fontSize: 24, fontWeight: 500, color: t.color }}>{numToKhmer(t.rate)}</div>
            <div style={{ fontSize: 11, color: "#888", marginTop: 1 }}>រៀល / kWh</div>
            <div style={{ height: 3, borderRadius: 2, background: "#eee", marginTop: 10 }}>
              <div style={{ height: "100%", width: t.barPct, background: t.barColor, borderRadius: 2 }} />
            </div>
          </div>
        ))}
      </div>

      <div style={{ background: "#f7f7f5", borderRadius: 12, padding: "1.1rem 1.25rem", marginBottom: "1rem" }}>
        <div style={{ fontSize: 14, fontWeight: 500, color: "#111", marginBottom: "1rem" }}>🧮 គណនាថ្លៃអគ្គិសនីប្រចាំខែ</div>

        {/* Slider + input */}
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
          <span style={{ fontSize: 13, color: "#666", minWidth: 70, flexShrink: 0 }}>ប្រើប្រាស់</span>
          <input type="range" min={0} max={1000} step={5} value={Math.min(units, 1000)}
            onChange={handleSlider} style={{ flex: 1, accentColor: "#1D9E75", minWidth: 0 }} />
          <div style={{ display: "flex", alignItems: "center", gap: 4, flexShrink: 0 }}>
            <input type="text" value={inputVal}
              onChange={e => handleInput(e.target.value)}
              onBlur={() => setInputVal(toKh(units))}
              style={{ width: Math.max(56, inputVal.length * 12 + 16), padding: "5px 8px", fontSize: 13, fontWeight: 500, border: "1.5px solid #1D9E75", borderRadius: 7, textAlign: "center", color: "#0F6E56", background: "#f0faf6", outline: "none" }} />
            <span style={{ fontSize: 12, color: "#888" }}>kWh</span>
          </div>
        </div>

        {/* Breakdown — tier name | qty kWh × rate = cost */}
        <div style={{ borderTop: "0.5px solid #ddd", paddingTop: 8, marginBottom: 10, marginTop: 8 }}>
          {lines.map((l, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 12, color: "#666", lineHeight: 2 }}>
              <span>{l.tierName}: <strong style={{ color: "#333" }}>{numToKhmer(l.qty)} kWh</strong> × {numToKhmer(l.rate)} ៛</span>
              <span style={{ fontWeight: 600, color: "#333", marginLeft: 8 }}>{numToKhmer(l.cost)} ៛</span>
            </div>
          ))}
        </div>

        {/* Total */}
        <div style={{ background: "#fff", border: "0.5px solid #e0e0e0", borderRadius: 8, padding: "0.9rem 1rem", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontSize: 14, color: "#555", fontWeight: 500 }}>ថ្លៃសរុបប្រចាំខែ</div>
          <div style={{ fontSize: 16, fontWeight: 600, color: "#0F6E56" }}>{numToKhmer(total)} ៛</div>
        </div>

        <div style={{ display: "flex", gap: 6, marginTop: 8, fontSize: 12, color: "#666" }}>
          <span>💡</span><span>{getTip(units)}</span>
        </div>
      </div>

      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        {[
          { icon: "🌿", label: "គន្លឹះសំចៃ", p: "saving" },
          { icon: "💳", label: "វិធីបង់ប្រាក់", p: "payment" },
          { icon: "🎯", label: "ផែនការសន្សំ", p: "plan" },
        ].map(a => (
          <button key={a.label} onClick={() => setPage(a.p)}
            style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13, padding: "8px 14px", borderRadius: 8, border: "0.5px solid #ccc", background: "#fff", cursor: "pointer", color: "#111" }}>
            {a.icon} {a.label} →
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.render(<EDCTariff />, document.getElementById('root'));
</script>
</body>
</html>
